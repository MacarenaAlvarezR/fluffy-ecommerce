<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluffy</title>

    <script src="https://kit.fontawesome.com/505307b769.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

<div class="main-container">

    <!-- MENU -->
    <header class="menu">
        <h1><i class="fa-solid fa-cloud"></i> Fluffy</h1>

        <i class="fa-solid fa-bars hamburguesa" id="menuBtn"></i>

        <nav>
            <ul class="links" id="menuLinks">
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Catálogo</a></li>
                <li><a href="#">Ofertas</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <!-- FILTROS -->
    <aside class="box filtros">
        <label>Ordenar por:</label>
        <select>
            <option>Precio</option>
            <option>Mayor a menor</option>
            <option>Menor a mayor</option>
        </select>
    </aside>

    <!-- PRODUCTOS -->
    <main class="box main">

        <div class="producto">
            <img src="./assets/img/sandia.jpg">
            <h3>Sandía</h3>
            <button class="add-cart" data-name="Sandía">Agregar al carrito</button>
        </div>

        <div class="producto">
            <img src="./assets/img/nube1.jpg">
            <h3>Nube</h3>
            <button class="add-cart" data-name="Nube">Agregar al carrito</button>
        </div>

        <div class="producto">
            <img src="./assets/img/flor1.jpg">
            <h3>Flor</h3>
            <button class="add-cart" data-name="Flor">Agregar al carrito</button>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="pie-pagina">
        <p>Todos los derechos reservados</p>
    </footer>

</div>

<!-- 🛒 CARRITO -->
<div class="cart">
    <h3>🛒 Carrito</h3>
    <ul id="cart-list"></ul>
    <p>Total: $<span id="cart-total">0</span></p>
</div>

<script src="./assets/js/index.js"></script>

</body>
</html>
